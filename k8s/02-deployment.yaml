apiVersion: v1
kind: ConfigMap
metadata:
  name: opds-script
  namespace: biblioteca
data:
  generate_opds.py: |
    import os
    import time
    from xml.sax.saxutils import escape

    def create_opds():
        path = "/books"
        files = [f for f in os.listdir(path) if f.endswith(('.pdf', '.epub', '.mobi'))]
        
        xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
        xml += '<feed xmlns="http://www.w3.org/2005/Atom">\n'
        xml += '  <title>Neravy OPDS</title>\n'
        xml += '  <entry>\n    <title>Lista de Libros</title>\n  </entry>\n'
        
        for f in files:
            xml += '  <entry>\n'
            xml += f'    <title>{escape(f)}</title>\n'
            xml += f'    <link rel="http://opds-spec.org/acquisition" href="{escape(f)}" type="application/octet-stream"/>\n'
            xml += '  </entry>\n'
        
        xml += '</feed>'
        with open("/books/opds.xml", "w") as f:
            f.write(xml)

    while True:
        create_opds()
        time.sleep(300) # Se actualiza cada 5 minutos
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexador-libros
  namespace: biblioteca
spec:
  replicas: 1
  selector:
    matchLabels:
      app: indexador
  template:
    metadata:
      labels:
        app: indexador
    spec:
      containers:
      # CONTENEDOR 1: NGINX (El que ya tienes)
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: libros-storage
          mountPath: /usr/share/nginx/html
        - name: config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
          
      # CONTENEDOR 2: EL GENERADOR OPDS (El "Sidecar")
      - name: opds-gen
        image: python:3.9-slim
        command: ["python", "/scripts/generate_opds.py"]
        volumeMounts:
        - name: libros-storage
          mountPath: /books
        - name: script-volume
          mountPath: /scripts
      
      volumes:
      - name: libros-storage
        persistentVolumeClaim:
          claimName: libros-pvc
      - name: config-volume
        configMap:
          name: nginx-config
      - name: script-volume
        configMap:
          name: opds-script
