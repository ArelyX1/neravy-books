apiVersion: apps/v1
kind: Deployment
metadata:
  name: kavita
  namespace: biblioteca
spec:
  replicas: 1
  strategy:
    type: Recreate 
  selector:
    matchLabels:
      app: kavita
  template:
    metadata:
      labels:
        app: kavita
    spec:
      containers:
      - name: kavita
        image: jvmilazz0/kavita:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http-web
        volumeMounts:
        - name: config
          mountPath: /kavita/config
        - name: libros
          mountPath: /data/books
      volumes:
      - name: config
        hostPath:
          path: /opt/neravy-books/kavita/config
          type: DirectoryOrCreate
      - name: libros
        hostPath:
          path: /opt/neravy-books/kavita/libros
          type: DirectoryOrCreate
