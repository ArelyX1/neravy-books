apiVersion: v1
kind: ConfigMap
metadata:
  name: opds-script
  namespace: biblioteca
data:
  generate_opds.py: |
    import os
    import time
    from xml.sax.saxutils import escape

    def create_opds():
        path = "/books"
        if not os.path.exists(path):
            return
        
        # Escaneamos archivos válidos
        files = [f for f in os.listdir(path) if f != 'opds.xml' and not f.startswith('.')]
        
        xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
        xml += '<feed xmlns="http://www.w3.org/2005/Atom" xmlns:opds="http://opds-spec.org/2010/catalog">\n'
        xml += '  <title>NervyAI Digital Library</title>\n'
        xml += f'  <updated>{time.strftime("%Y-%m-%dT%H:%M:%SZ")}</updated>\n'
        xml += '  <author><name>ArelyXl</name></author>\n'
        xml += '  <id>tag:neravy.us,2026:libros</id>\n'
        
        for f in files:
            ext = f.split('.')[-1].lower()
            if ext == "pdf":
                mime = "application/pdf"
            elif ext == "epub":
                mime = "application/epub+zip"
            else:
                mime = "application/octet-stream"

            xml += '  <entry>\n'
            xml += f'    <title>{escape(f)}</title>\n'
            xml += f'    <id>tag:neravy.us,2026:{escape(f)}</id>\n'
            xml += f'    <updated>{time.strftime("%Y-%m-%dT%H:%M:%SZ")}</updated>\n'
            xml += '    <content type="text">Disponible en Poteto-Serv</content>\n'
            xml += f'    <link rel="http://opds-spec.org/acquisition" href="{escape(f)}" type="{mime}"/>\n'
            xml += '  </entry>\n'
        
        xml += '</feed>'
        # Escribimos en el volumen compartido
        with open("/books/opds.xml", "w") as f_out:
            f_out.write(xml)

    if __name__ == "__main__":
        while True:
            try:
                create_opds()
            except Exception as e:
                print(f"Error: {e}")
            time.sleep(60)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexador-libros
  namespace: biblioteca
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: indexador
  template:
    metadata:
      labels:
        app: indexador
    spec:
      containers:
      # CONTENEDOR 1: NGINX
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: libros-storage
          mountPath: /usr/share/nginx/html
        - name: config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        resources:
          limits:
            memory: "32Mi"
            cpu: "50m"

      # CONTENEDOR 2: EL GENERADOR OPDS (Sidecar)
      - name: opds-gen
        image: python:3.9-slim
        command: ["python", "/scripts/generate_opds.py"]
        volumeMounts:
        - name: libros-storage
          mountPath: /books
        - name: script-volume
          mountPath: /scripts
        resources:
          limits:
            memory: "48Mi"
            cpu: "50m"

      volumes:
      - name: libros-storage
        persistentVolumeClaim:
          claimName: libros-pvc
      - name: config-volume
        configMap:
          name: nginx-config
      - name: script-volume
        configMap:
          name: opds-script
