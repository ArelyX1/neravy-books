apiVersion: apps/v1
kind: Deployment
metadata:
  name: kavita
  namespace: biblioteca
spec:
  replicas: 1
  strategy:
    type: Recreate 
  selector:
    matchLabels:
      app: kavita
  template:
    metadata:
      labels:
        app: kavita
    spec:
      containers:
      - name: kavita
        image: jvmilazz0/kavita:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http-web
        # Aumentamos el tiempo inicial porque tu servidor local necesita procesar la DB
        startupProbe: # Esta sonda se encarga solo del arranque
          httpGet:
            path: /
            port: 5000
          failureThreshold: 30 # Lo intentará 30 veces
          periodSeconds: 10    # Cada 10 segundos (Total 5 minutos de margen)
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 60 # Espera un minuto antes de empezar a vigilar
          periodSeconds: 20
        volumeMounts:
        - name: config
          mountPath: /kavita/config
        - name: libros
          mountPath: /data/books
      volumes:
      - name: config
        hostPath:
          path: /opt/neravy-books/kavita/config
          type: DirectoryOrCreate
      - name: libros
        hostPath:
          path: /opt/neravy-books/kavita/libros
          type: DirectoryOrCreate
