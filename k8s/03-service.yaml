apiVersion: v1
kind: Service
metadata:
  name: ubooquity-service
  namespace: biblioteca
spec:
  type: NodePort
  selector:
    app: ubooquity
  ports:
    - name: library
      protocol: TCP
      port: 8443
      targetPort: 2202
      nodePort: 30443
    - name: admin
      protocol: TCP
      port: 2203
      targetPort: 2203
      nodePort: 32203
