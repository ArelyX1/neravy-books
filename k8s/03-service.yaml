apiVersion: v1
kind: Service
metadata:
  name: kavita-service
  namespace: biblioteca
spec:
  type: NodePort           # Cambiado de LoadBalancer a NodePort
  selector:
    app: kavita
  ports:
    - name: http-web
      protocol: TCP
      port: 8888           # Puerto interno del service
      targetPort: 5000     # Puerto donde escucha el pod de Kavita
      nodePort: 30088      # El puerto real que abriremos en Ubuntu
