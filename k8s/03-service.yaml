apiVersion: v1
kind: Service
metadata:
  name: ubooquity-service
  namespace: biblioteca
spec:
  type: NodePort
  selector:
    app: ubooquity
  ports:
    - name: library
      protocol: TCP
      port: 8443        # El que usarás con Cloudflare
      targetPort: 2202  # Interno de la biblioteca
      nodePort: 30443   # Acceso local en 192.168.1.100:30443
    - name: admin
      protocol: TCP
      port: 2203
      targetPort: 2203
      nodePort: 32203   # Acceso local para configuración inicial
